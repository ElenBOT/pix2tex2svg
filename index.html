<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaTeX to SVG Converter</title>
    <!-- Modern font for UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- MathJax v3 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
            },
            svg: {
                fontCache: 'local'
            },
            startup: {
                typeset: false // We will typeset manually
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4.0.0-beta.4/tex-svg.js"></script>
    <!-- jsPDF for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg2pdf.js@2.2.2/dist/svg2pdf.umd.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>LaTeX to SVG Converter</h1>
            <p>From LaTeX to SVG. copy as svg code, download as svg, png, pdf.</p>
        </header>

        <section class="controls-panel">
            <div class="control-group">
                <label for="export-size">Export Expression Size</label>
                <input type="number" id="export-size" min="10" max="200" value="14">
                <span>px</span>
            </div>
            <div class="control-group">
                <label for="export-color">Export Expression Color</label>
                <input type="color" id="export-color" value="#000000">
            </div>
            <div class="control-group">
                <label for="export-bg-color">Export Background</label>
                <button id="export-bg-transparent-btn" class="transparent-toggle active" title="Transparent background">None</button>
                <input type="color" id="export-bg-color" value="#ffffff" disabled>
            </div>
        </section>

        <main id="rows-container">
            <!-- Rows will be dynamically added here -->
        </main>

        <div class="action-buttons">
            <button id="add-row-btn" class="primary-btn">
                + Add Equation Row
            </button>
        </div>
    </div>

    <!-- Template for a row -->
    <template id="row-template">
        <div class="equation-row">
            <div class="input-section">
                <textarea class="latex-input" placeholder="Enter LaTeX here... e.g. E = mc^2"></textarea>
            </div>
            <div class="preview-section">
                <div class="svg-output"></div>
                <div class="error-msg"></div>
            </div>
            <div class="row-actions">
                <button class="action-btn remove-row-btn" title="Remove Row">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
                <div class="copy-dropdown-container">
                    <button class="action-btn copy-btn" title="Copy">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="0" ry="0"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                    <div class="copy-menu">
                        <button class="menu-item copy-svg-btn">SVG</button>
                        <button class="menu-item copy-png-btn">PNG</button>
                    </div>
                </div>
                <div class="download-dropdown-container">
                    <button class="action-btn download-btn" title="Download">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </button>
                    <div class="download-menu">
                        <button class="menu-item download-svg-btn">SVG</button>
                        <button class="menu-item download-png-btn">PNG</button>
                        <button class="menu-item download-pdf-btn">PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaTeX to SVG Converter</title>
    <!-- Modern font for UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- MathJax v3 -->
    <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
      },
      svg: {
        fontCache: 'global'
      },
      startup: {
        typeset: false // We will typeset manually
      }
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <!-- jsPDF for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>LaTeX to SVG Converter</h1>
            <p>Type your LaTeX code and instantly convert it into beautiful, exportable SVG formulas.</p>
        </header>

        <section class="controls-panel glassmorphism">
            <div class="control-group">
                <label for="global-size">Formula Size</label>
                <input type="range" id="global-size" min="10" max="100" value="32">
                <span id="size-value">32px</span>
            </div>
            <div class="control-group">
                <label for="global-color">Formula Color</label>
                <input type="color" id="global-color" value="#ffffff">
            </div>
        </section>

        <main id="rows-container">
            <!-- Rows will be dynamically added here -->
        </main>

        <div class="action-buttons">
            <button id="add-row-btn" class="primary-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add Equation Row
            </button>
        </div>
    </div>

    <!-- Template for a row -->
    <template id="row-template">
        <div class="equation-row glassmorphism">
            <div class="row-header">
                <span class="row-title">Equation</span>
                <button class="icon-btn remove-row-btn" title="Remove Row">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="row-content">
                <div class="input-section">
                    <textarea class="latex-input" placeholder="Enter LaTeX here... e.g. E = mc^2"></textarea>
                </div>
                <div class="preview-section">
                    <div class="svg-output"></div>
                    <div class="error-msg"></div>
                </div>
            </div>
            <div class="row-actions">
                <button class="action-btn copy-svg-btn">Copy SVG Text</button>
                <button class="action-btn download-svg-btn">Download SVG</button>
                <button class="action-btn download-png-btn">Download PNG</button>
                <button class="action-btn download-pdf-btn">Download PDF</button>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>

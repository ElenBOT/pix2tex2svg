<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>pix2tex2svg — Image OCR → LaTeX → SVG</title>
    <meta name="description" content="Paste or upload an equation image, OCR it to LaTeX with pix2tex, then export as SVG/PNG/PDF. Local, private, no cloud required.">
    <meta name="keywords" content="pix2tex, latex ocr, image to latex, math ocr, latex to svg, equation converter">
    <meta name="author" content="ElenBOT">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="pix2tex2svg — Image OCR → LaTeX → SVG">
    <meta property="og:description" content="Paste an equation screenshot, OCR it to LaTeX, export as SVG/PNG/PDF. Runs locally.">

    <!-- UI font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- MathJax v4 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
            },
            svg: { fontCache: 'local' },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4.0.0-beta.4/tex-svg.js"></script>
    <!-- jsPDF + svg2pdf for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg2pdf.js@2.2.2/dist/svg2pdf.umd.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-badge">OCR → LaTeX → SVG</div>
            <h1>pix2tex<span class="accent">2</span>svg</h1>
            <p>Paste or upload an equation image → OCR to LaTeX → export as SVG / PNG / PDF</p>
        </header>

        <section class="controls-panel">
            <div class="control-group">
                <label for="export-size">Export Size</label>
                <input type="number" id="export-size" min="10" max="200" value="14">
                <span>px</span>
            </div>
            <div class="control-group">
                <label for="export-color">Expression Color</label>
                <input type="color" id="export-color" value="#000000">
            </div>
            <div class="control-group">
                <label for="export-bg-color">Background</label>
                <button id="export-bg-transparent-btn" class="transparent-toggle active" title="Transparent background">None</button>
                <input type="color" id="export-bg-color" value="#ffffff" disabled>
            </div>
            <div class="control-group server-status-group">
                <span class="server-dot" id="server-dot"></span>
                <span id="server-status-label">OCR server…</span>
            </div>
        </section>

        <main id="rows-container">
            <!-- Rows injected here -->
        </main>

        <div class="action-buttons">
            <button id="add-row-btn" class="primary-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Equation Row
            </button>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast" aria-live="polite"></div>

    <!-- Hidden file input for OCR uploads -->
    <input type="file" id="global-file-input" accept="image/*" style="display:none">

    <!-- Row template -->
    <template id="row-template">
        <div class="equation-row" draggable="false">
            <!-- ── LEFT action strip (new) ── -->
            <div class="row-actions row-actions-left">
                <!-- Drag handle -->
                <button class="action-btn drag-handle-btn" title="Drag to reorder">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="6" r="1.2" fill="currentColor" stroke="none"/>
                        <circle cx="15" cy="6" r="1.2" fill="currentColor" stroke="none"/>
                        <circle cx="9" cy="12" r="1.2" fill="currentColor" stroke="none"/>
                        <circle cx="15" cy="12" r="1.2" fill="currentColor" stroke="none"/>
                        <circle cx="9" cy="18" r="1.2" fill="currentColor" stroke="none"/>
                        <circle cx="15" cy="18" r="1.2" fill="currentColor" stroke="none"/>
                    </svg>
                </button>
                <!-- Paste from clipboard -->
                <button class="action-btn ocr-paste-btn" title="Paste image from clipboard → OCR to LaTeX">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                        <line x1="12" y1="11" x2="12" y2="17"/>
                        <line x1="9" y1="14" x2="15" y2="14"/>
                    </svg>
                    <span class="paste-info-icon" title="Clipboard API requires HTTPS. Click for details.">?</span>
                </button>
                <!-- Upload file -->
                <button class="action-btn ocr-upload-btn" title="Upload image file → OCR to LaTeX">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </button>
            </div>

            <!-- ── Main content ── -->
            <div class="input-section">
                <textarea class="latex-input" placeholder="Enter LaTeX here… or use the OCR buttons on the left"></textarea>
                <div class="ocr-status"></div>
            </div>
            <div class="preview-section">
                <div class="svg-output"></div>
                <div class="error-msg"></div>
            </div>

            <!-- ── RIGHT action strip (existing) ── -->
            <div class="row-actions row-actions-right">
                <button class="action-btn remove-row-btn" title="Remove Row">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <div class="copy-dropdown-container">
                    <button class="action-btn copy-btn" title="Copy">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="0" ry="0"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                    </button>
                    <div class="copy-menu">
                        <button class="menu-item copy-svg-btn">SVG</button>
                        <button class="menu-item copy-png-btn">PNG</button>
                    </div>
                </div>
                <div class="download-dropdown-container">
                    <button class="action-btn download-btn" title="Download">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                    </button>
                    <div class="download-menu">
                        <button class="menu-item download-svg-btn">SVG</button>
                        <button class="menu-item download-png-btn">PNG</button>
                        <button class="menu-item download-pdf-btn">PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>

</html>
